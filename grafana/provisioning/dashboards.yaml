# Grafana dashboard provider (Slice 4b). Mount at /etc/grafana/provisioning/dashboards/ and
# mount the dashboards dir at /etc/grafana/dashboards.
apiVersion: 1
providers:
  - name: error-observability
    orgId: 1
    folder: Observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
