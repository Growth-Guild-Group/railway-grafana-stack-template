# Grafana datasource provisioning. Mounted at /etc/grafana/provisioning/datasources/.
# The uids (prometheus/loki/tempo) match the dashboard JSON + the alerting rules.
#
# PLAIN datasources ‚Äî NO cross-datasource `datasourceUid` refs (exemplarTraceIdDestinations,
# derivedFields, tracesToLogsV2). Those caused "Datasource provisioning error: data source not
# found" on a fresh Grafana: Grafana can't resolve a datasourceUid pointing at another datasource
# created in the SAME provisioning batch. (The upstream template ships without them too.)
# Trace correlations use the explicit `correlations:` key (below), which runs AFTER datasources exist
# ‚Äî the mechanism designed for cross-datasource links. log‚Üítrace is wired; trace‚Üílogs + metric‚Üítrace
# (exemplars) follow once this proves clean.
apiVersion: 1

# Delete provisioned datasources no longer present in a provisioning file.
prune: false

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: $PROMETHEUS_INTERNAL_URL # e.g. http://prometheus.railway.internal:9090 (BARE service host ‚Äî a stale -suffix won't resolve)
    isDefault: true # the ONE default
    jsonData:
      # Grafana-managed alerting only (rules live in grafana/alerting/). Don't let the Alerting UI
      # query this datasource's ruler API for data-source-managed rules.
      manageAlerts: false

  - name: Loki
    type: loki
    access: proxy # NOT direct ‚Äî the browser can't reach *.railway.internal (server proxies)
    orgId: 1
    uid: loki
    url: $LOKI_INTERNAL_URL # e.g. http://loki.railway.internal:3100 (query AND Alloy push both use :3100 ‚Äî NOT Grafana's :3000)
    isDefault: false
    jsonData:
      # single-binary Loki has no ruler API ‚Üí the Alerting UI's rule fetch 404s ("Cannot load
      # rules for this datasource"). We use Grafana-managed alerting only, so disable it.
      manageAlerts: false
    # log ‚Üí trace (¬ß16): open the Tempo trace referenced by a log's traceId. Uses the explicit
    # `correlations` key (applied after datasources exist) ‚Äî NOT jsonData derivedFields (which
    # Grafana migrates to correlations during datasource provisioning = the same-batch failure that
    # poisoned the volume). NOTE: if the link doesn't resolve, the `field` may need to be `trace_id`
    # (OTLP‚ÜíLoki naming) ‚Äî verify against a real log; a wrong field is a soft failure, not a crash.
    correlations:
      - targetUID: tempo
        label: 'View trace'
        description: 'Open the Tempo trace for this log line'
        type: query
        config:
          field: traceId
          target:
            queryType: traceql
            query: '$${__value.raw}' # escaped $$ ‚Äî this file interpolates $VAR env vars

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: tempo
    url: $TEMPO_INTERNAL_URL # QUERY API ‚Äî e.g. http://tempo.railway.internal:3200 (NOT :4317)
    isDefault: false
    # trace ‚Üí logs: from a span, find its Loki logs by traceId (line filter, works whether traceId
    # is a field or in the line). NOTE tunable in the UI: the stream selector assumes a `service`
    # label and the source field is `traceID` ‚Äî adjust if the link returns nothing (soft failure).
    correlations:
      - targetUID: loki
        label: 'View logs'
        description: 'Find Loki logs for this trace'
        type: query
        config:
          field: traceID
          target:
            expr: '{service=~".+"} |= "$${__value.raw}"' # escaped $$ ‚Äî file interpolates $VAR
