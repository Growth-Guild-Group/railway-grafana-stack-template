# Grafana datasource provisioning. Mounted at /etc/grafana/provisioning/datasources/.
# The uids (prometheus/loki/tempo) match the dashboard JSON + the alerting rules.
#
# PLAIN datasources — NO cross-datasource `datasourceUid` refs (exemplarTraceIdDestinations,
# derivedFields, tracesToLogsV2). Those caused "Datasource provisioning error: data source not
# found" on a fresh Grafana: Grafana can't resolve a datasourceUid pointing at another datasource
# created in the SAME provisioning batch. (The upstream template ships without them too.)
# Trace correlations use the explicit `correlations:` key (below), which runs AFTER datasources exist
# — the mechanism designed for cross-datasource links. log→trace is wired; trace→logs + metric→trace
# (exemplars) follow once this proves clean.
apiVersion: 1

# Delete provisioned datasources no longer present in a provisioning file.
prune: false

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: $PROMETHEUS_INTERNAL_URL # e.g. http://prometheus-yqhm.railway.internal:9090
    isDefault: true # the ONE default

  - name: Loki
    type: loki
    access: proxy # NOT direct — the browser can't reach *.railway.internal (server proxies)
    orgId: 1
    uid: loki
    url: $LOKI_INTERNAL_URL # e.g. http://loki.railway.internal:3100
    isDefault: false
    # log → trace (§16): open the Tempo trace referenced by a log's traceId. Uses the explicit
    # `correlations` key (applied after datasources exist) — NOT jsonData derivedFields (which
    # Grafana migrates to correlations during datasource provisioning = the same-batch failure that
    # poisoned the volume). NOTE: if the link doesn't resolve, the `field` may need to be `trace_id`
    # (OTLP→Loki naming) — verify against a real log; a wrong field is a soft failure, not a crash.
    correlations:
      - targetUID: tempo
        label: 'View trace'
        description: 'Open the Tempo trace for this log line'
        type: query
        config:
          field: traceId
          target:
            queryType: traceql
            query: '$${__value.raw}' # escaped $$ — this file interpolates $VAR env vars

  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: tempo
    url: $TEMPO_INTERNAL_URL # QUERY API — e.g. http://tempo.railway.internal:3200 (NOT :4317)
    isDefault: false
