# Grafana notification policy provisioning (apiVersion 1). The root route sends all alerts to the
# `discord-errors` contact point (contactpoints.yaml). NOTE: provisioning `policies` REPLACES the
# org's entire notification policy tree — fine here (error-observability is the only alert source).
apiVersion: 1
policies:
  - orgId: 1
    receiver: discord-errors
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
