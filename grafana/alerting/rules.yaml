# Grafana Alerting provisioning (apiVersion 1). §13 error-observability alerts.
# Routing: the notification policy (policies.yaml) sends everything to the `discord-errors`
# contact point (contactpoints.yaml). Aggregations use BOUNDED labels only (§7).
# Each rule: query Prometheus (refId A, instant) -> math threshold expression (refId C, the
# condition). noDataState=OK: "no errors" is the HEALTHY state, so no-data must NOT alert — with
# NoData, Grafana fires a DatasourceNoData notification, which is backwards for error-rate alerts.
# Rules only fire on a real threshold breach. THRESHOLDS ARE PLACEHOLDERS — tune to real baselines.
apiVersion: 1
groups:
  - orgId: 1
    name: error-observability
    folder: Observability
    interval: 1m
    rules:
      - uid: eo-high-internal-error-rate
        title: High internal / 5xx error rate
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'High 5xx/internal error rate — {{ $labels.service }}/{{ $labels.subsystem }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{code=~"ERR_INTERNAL|ERR_DEPENDENCY"}[5m])) by (service, subsystem)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-high-uncaught-rate
        title: High uncaught / critical exception rate
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'Uncaught/critical exceptions rising — {{ $labels.service }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{severity="critical"}[5m])) by (service)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.01'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-worker-job-failure-spike
        title: Worker job-failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Worker terminal failures spiking — job {{ $labels.jobType }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem=~"worker\\..*", severity="error"}[5m])) by (jobType)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-webhook-failure-spike
        title: Webhook failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Inbound webhook failures spiking — {{ $labels.subsystem }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem=~"webhook\\..*"}[5m])) by (subsystem)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-ai-provider-failure-spike
        title: AI gateway provider-failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'AI provider failures — {{ $labels.dependency }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem="ai.gateway", subcode=~"AI_PROVIDER_.*"}[5m])) by (dependency)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-auth-abuse-anomaly
        title: Auth / rate-limit anomaly (possible abuse)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Auth/rate-limit anomaly — route {{ $labels.route }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(operational_anomalies_total{code=~"ERR_FORBIDDEN|ERR_RATE_LIMITED"}[5m])) by (route)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

  # Layer A — INTERNAL synthetic monitoring (Blackbox Exporter). ENGINEERING alerts only: these run
  # inside the Railway failure domain and MUST NOT feed a customer-facing status page. The `audience:
  # engineering` label marks that boundary. Customer-facing uptime is Layer B (independent external
  # probe) — a pre-launch requirement. probe-down (a target failed) is kept DISTINCT from
  # exporter-down (the probe system itself is blind).
  - orgId: 1
    name: synthetic-monitoring
    folder: Observability
    interval: 1m
    rules:
      - uid: synthetic-probe-down
        title: Synthetic probe down (target unreachable)
        condition: C
        for: 2m
        # A configured-but-failing target still emits probe_success=0, so "no data" here means the
        # EXPORTER isn't scraping — that case is owned by synthetic-blackbox-exporter-down. Keep OK so
        # the two signals stay distinct.
        noDataState: OK
        execErrState: Error
        labels: { audience: engineering, severity: page }
        annotations:
          summary: 'Synthetic probe DOWN — {{ $labels.service }}/{{ $labels.surface }} ({{ $labels.instance }}), criticality={{ $labels.criticality }}, provider={{ $labels.provider }}. Layer A (engineering) — NOT a customer-facing signal.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'probe_success'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: synthetic-blackbox-exporter-down
        title: Blackbox exporter down (synthetic monitoring blind)
        condition: C
        for: 2m
        # Exporter unreachable ⇒ ALL probes are stale ⇒ we've lost synthetic visibility. No data
        # (job absent) also means blind, so alert on it too. Distinguishes probe-SYSTEM failure from
        # a single target failure (synthetic-probe-down).
        noDataState: Alerting
        execErrState: Alerting
        labels: { audience: engineering, severity: page }
        annotations:
          summary: 'Blackbox exporter unreachable — Layer A synthetic monitoring is BLIND (all probes stale). Engineering-only.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'min(up{job="blackbox"})'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: synthetic-tls-cert-expiring
        title: TLS certificate expiring soon (synthetic probe)
        condition: C
        for: 1h
        noDataState: OK
        execErrState: Error
        labels: { audience: engineering, severity: ticket }
        annotations:
          summary: 'TLS cert for {{ $labels.instance }} expires in < 14d ({{ $labels.service }}/{{ $labels.surface }}). Engineering — renew before expiry.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'probe_ssl_earliest_cert_expiry - time()'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1209600'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

  # ── Email reputation (SES Tier 2 — lucidserum-core docs/engineering/alert-catalog.md
  # ALT-011..014, spec 26 §4.5; thresholds user-reviewed 2026-07-06). Numerator:
  # email_provider_events_total{provider,event_type,bounce_classification} (fresh
  # provider-event ledger inserts, redelivery-proof). Denominator:
  # messaging_send_provider_accepted_total (accepted outbound CONVERSATION sends; no
  # provider label — exact under the one-default-identity model, catalog documents the
  # caveat). The `and` floor clause makes the ratio series EMPTY below the floor →
  # noDataState OK = no alert (denominator floors, never a 1-bounce-in-10-sends page).
  - orgId: 1
    name: email-reputation
    folder: Observability
    interval: 1m
    rules:
      - uid: ses-bounce-rate-warn
        title: 'ALT-011: SES bounce rate > 2% (floor 200 sends/1h)'
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warn }
        annotations:
          summary: 'SES bounce rate above 2% over 1h — check email_provider_events ledger for the bouncing recipients/tenant'
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: '(sum(increase(email_provider_events_total{provider="ses",event_type="bounced"}[1h])) / sum(increase(messaging_send_provider_accepted_total[1h]))) and on() (sum(increase(messaging_send_provider_accepted_total[1h])) >= 200)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.02'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: ses-bounce-rate-page
        title: 'ALT-012: SES bounce rate > 4% (floor 200 sends/1h)'
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'SES bounce rate above 4% over 1h — consider the manual levers (identity flip / env kill) BEFORE the 5% SES review band'
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: '(sum(increase(email_provider_events_total{provider="ses",event_type="bounced"}[1h])) / sum(increase(messaging_send_provider_accepted_total[1h]))) and on() (sum(increase(messaging_send_provider_accepted_total[1h])) >= 200)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.04'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: ses-complaint-rate-warn
        title: 'ALT-013: SES complaint rate > 0.05% (floor 1000 sends/1h)'
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warn }
        annotations:
          summary: 'SES complaint rate above 0.05% over 1h — complaints are consent failures; identify the sending tenant/content'
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: '(sum(increase(email_provider_events_total{provider="ses",event_type="complained"}[1h])) / sum(increase(messaging_send_provider_accepted_total[1h]))) and on() (sum(increase(messaging_send_provider_accepted_total[1h])) >= 1000)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.0005'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: ses-complaint-rate-page
        title: 'ALT-013: SES complaint rate >= 0.1% (floor 1000 sends/1h)'
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'SES complaint rate at/above the 0.1% SES review band — act now'
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: '(sum(increase(email_provider_events_total{provider="ses",event_type="complained"}[1h])) / sum(increase(messaging_send_provider_accepted_total[1h]))) and on() (sum(increase(messaging_send_provider_accepted_total[1h])) >= 1000)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A >= 0.001'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: ses-complaint-absolute
        title: 'ALT-014: SES absolute complaints >= 3 in 1h (NO floor)'
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'SES received >= 3 complaints in 1h — a denominator floor must never suppress complaints; investigate every one'
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(increase(email_provider_events_total{provider="ses",event_type="complained"}[1h]))'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A >= 3'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
