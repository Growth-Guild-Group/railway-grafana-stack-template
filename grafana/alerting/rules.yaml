# Grafana Alerting provisioning (apiVersion 1). §13 error-observability alerts.
# Routing: the notification policy (policies.yaml) sends everything to the `discord-errors`
# contact point (contactpoints.yaml). Aggregations use BOUNDED labels only (§7).
# Each rule: query Prometheus (refId A, instant) -> math threshold expression (refId C, the
# condition). noDataState=OK: "no errors" is the HEALTHY state, so no-data must NOT alert — with
# NoData, Grafana fires a DatasourceNoData notification, which is backwards for error-rate alerts.
# Rules only fire on a real threshold breach. THRESHOLDS ARE PLACEHOLDERS — tune to real baselines.
apiVersion: 1
groups:
  - orgId: 1
    name: error-observability
    folder: Observability
    interval: 1m
    rules:
      - uid: eo-high-internal-error-rate
        title: High internal / 5xx error rate
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'High 5xx/internal error rate — {{ $labels.service }}/{{ $labels.subsystem }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{code=~"ERR_INTERNAL|ERR_DEPENDENCY"}[5m])) by (service, subsystem)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-high-uncaught-rate
        title: High uncaught / critical exception rate
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: page }
        annotations:
          summary: 'Uncaught/critical exceptions rising — {{ $labels.service }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{severity="critical"}[5m])) by (service)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.01'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-worker-job-failure-spike
        title: Worker job-failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Worker terminal failures spiking — job {{ $labels.jobType }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem=~"worker\\..*", severity="error"}[5m])) by (jobType)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-webhook-failure-spike
        title: Webhook failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Inbound webhook failures spiking — {{ $labels.subsystem }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem=~"webhook\\..*"}[5m])) by (subsystem)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-ai-provider-failure-spike
        title: AI gateway provider-failure spike
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'AI provider failures — {{ $labels.dependency }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(errors_total{subsystem="ai.gateway", subcode=~"AI_PROVIDER_.*"}[5m])) by (dependency)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: eo-auth-abuse-anomaly
        title: Auth / rate-limit anomaly (possible abuse)
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: ticket }
        annotations:
          summary: 'Auth/rate-limit anomaly — route {{ $labels.route }}'
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'sum(rate(operational_anomalies_total{code=~"ERR_FORBIDDEN|ERR_RATE_LIMITED"}[5m])) by (route)'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A > 0.05'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

  # Layer A — INTERNAL synthetic monitoring (Blackbox Exporter). ENGINEERING alerts only: these run
  # inside the Railway failure domain and MUST NOT feed a customer-facing status page. The `audience:
  # engineering` label marks that boundary. Customer-facing uptime is Layer B (independent external
  # probe) — a pre-launch requirement. probe-down (a target failed) is kept DISTINCT from
  # exporter-down (the probe system itself is blind).
  - orgId: 1
    name: synthetic-monitoring
    folder: Observability
    interval: 1m
    rules:
      - uid: synthetic-probe-down
        title: Synthetic probe down (target unreachable)
        condition: C
        for: 2m
        # A configured-but-failing target still emits probe_success=0, so "no data" here means the
        # EXPORTER isn't scraping — that case is owned by synthetic-blackbox-exporter-down. Keep OK so
        # the two signals stay distinct.
        noDataState: OK
        execErrState: Error
        labels: { audience: engineering, severity: page }
        annotations:
          summary: 'Synthetic probe DOWN — {{ $labels.service }}/{{ $labels.surface }} ({{ $labels.instance }}), criticality={{ $labels.criticality }}, provider={{ $labels.provider }}. Layer A (engineering) — NOT a customer-facing signal.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'probe_success'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: synthetic-blackbox-exporter-down
        title: Blackbox exporter down (synthetic monitoring blind)
        condition: C
        for: 2m
        # Exporter unreachable ⇒ ALL probes are stale ⇒ we've lost synthetic visibility. No data
        # (job absent) also means blind, so alert on it too. Distinguishes probe-SYSTEM failure from
        # a single target failure (synthetic-probe-down).
        noDataState: Alerting
        execErrState: Alerting
        labels: { audience: engineering, severity: page }
        annotations:
          summary: 'Blackbox exporter unreachable — Layer A synthetic monitoring is BLIND (all probes stale). Engineering-only.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'min(up{job="blackbox"})'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C

      - uid: synthetic-tls-cert-expiring
        title: TLS certificate expiring soon (synthetic probe)
        condition: C
        for: 1h
        noDataState: OK
        execErrState: Error
        labels: { audience: engineering, severity: ticket }
        annotations:
          summary: 'TLS cert for {{ $labels.instance }} expires in < 14d ({{ $labels.service }}/{{ $labels.surface }}). Engineering — renew before expiry.'
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              datasource: { type: prometheus, uid: prometheus }
              editorMode: code
              expr: 'probe_ssl_earliest_cert_expiry - time()'
              instant: true
              range: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            relativeTimeRange: { from: 0, to: 0 }
            datasourceUid: __expr__
            model:
              datasource: { type: __expr__, uid: __expr__ }
              expression: '$A < 1209600'
              type: math
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
